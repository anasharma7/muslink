<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSLINK - Login</title>
    <link rel="stylesheet" href="styling.css">
</head>
<body>
    <header>
        <h1>MUSLINK</h1>
        <p>Connecting Buyers and Suppliers</p>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/services">Services</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        <section class="container">
            <h2>Login to Your Account</h2>
            <p>Select your role and log in to access your dashboard.</p>

            <!-- Login Form -->
            <form action="/login" method="POST">
                <label for="user-role">Are you a:</label>
                <select name="user-role" id="user-role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="supplier">Supplier</option>
                    <option value="buyer">Buyer</option>
                </select>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p class="signup-text">
                Don't have an account? <a href="/signup">Sign Up</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 MUSLINK. All Rights Reserved.</p>
    </footer>
</body>
</html>
